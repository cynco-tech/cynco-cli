name: PR Title Check
on:
  pull_request:
    types: [opened, edited, synchronize]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate PR title
        run: node .github/scripts/pr-title-check.js "$PR_TITLE"
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
